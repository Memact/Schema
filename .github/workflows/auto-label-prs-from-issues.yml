name: Auto-label PRs from resolved issues

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize, ready_for_review]

permissions:
  issues: write
  pull-requests: read

jobs:
  label-pr:
    name: Copy active issue labels to PR
    runs-on: ubuntu-latest
    steps:
      - name: Add active labels from resolved issues
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = pr.number;

            const ACTIVE_PROGRAM_LABEL = 'SSoC26';
            const ACTIVE_DIFFICULTY_LABELS = ['Easy', 'Medium', 'Hard'];
            const MANAGED_LABELS = [ACTIVE_PROGRAM_LABEL, ...ACTIVE_DIFFICULTY_LABELS];

            const removeManagedLabels = async (labelsToKeep = new Set()) => {
              const { data: currentPr } = await github.rest.issues.get({
                owner,
                repo,
                issue_number: prNumber,
              });

              const currentLabels = currentPr.labels.map((label) =>
                typeof label === 'string' ? label : label.name
              );
              const currentLabelNames = new Set(currentLabels.map((label) => label.toLowerCase()));

              const managedLabelsToRemove = MANAGED_LABELS.filter((label) =>
                currentLabelNames.has(label.toLowerCase()) && !labelsToKeep.has(label)
              );

              for (const label of managedLabelsToRemove) {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: prNumber,
                  name: label,
                });
              }

              return currentLabelNames;
            };

            const escapeRegExp = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const ownerPattern = escapeRegExp(owner);
            const repoPattern = escapeRegExp(repo);
            const issueNumbers = new Set();
            const prText = `${pr.title || ''}\n${pr.body || ''}`;

            const closingKeyword = '(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)';
            const sameRepoReference = new RegExp(`${closingKeyword}\\s+#(\\d+)`, 'gi');
            const qualifiedReference = new RegExp(`${closingKeyword}\\s+${ownerPattern}/${repoPattern}#(\\d+)`, 'gi');
            const urlReference = new RegExp(`${closingKeyword}\\s+https://github\\.com/${ownerPattern}/${repoPattern}/issues/(\\d+)`, 'gi');

            for (const pattern of [sameRepoReference, qualifiedReference, urlReference]) {
              for (const match of prText.matchAll(pattern)) {
                issueNumbers.add(Number(match[1]));
              }
            }

            if (issueNumbers.size === 0) {
              await removeManagedLabels();
              core.info('No resolved issue references found. Removed stale managed labels from the PR.');
              return;
            }

            const labelsToAdd = new Set();
            const difficultyLabelsFromIssues = new Set();

            for (const issueNumber of issueNumbers) {
              const { data: issue } = await github.rest.issues.get({
                owner,
                repo,
                issue_number: issueNumber,
              });

              if (issue.pull_request) {
                core.info(`#${issueNumber} is a pull request, not an issue; skipping.`);
                continue;
              }

              const issueLabels = issue.labels.map((label) =>
                typeof label === 'string' ? label : label.name
              );
              const issueLabelNames = new Set(issueLabels.map((label) => label.toLowerCase()));

              if (!issueLabelNames.has(ACTIVE_PROGRAM_LABEL.toLowerCase())) {
                core.info(`#${issueNumber} is not labeled ${ACTIVE_PROGRAM_LABEL}; skipping.`);
                continue;
              }

              labelsToAdd.add(ACTIVE_PROGRAM_LABEL);

              for (const difficultyLabel of ACTIVE_DIFFICULTY_LABELS) {
                if (issueLabelNames.has(difficultyLabel.toLowerCase())) {
                  difficultyLabelsFromIssues.add(difficultyLabel);
                }
              }
            }

            if (difficultyLabelsFromIssues.size > 1) {
              core.warning(`Resolved issues have conflicting difficulty labels: ${[...difficultyLabelsFromIssues].join(', ')}. A maintainer should choose the PR difficulty label manually.`);
            } else {
              for (const difficultyLabel of difficultyLabelsFromIssues) {
                labelsToAdd.add(difficultyLabel);
              }
            }

            const currentLabelNames = await removeManagedLabels(labelsToAdd);

            const missingLabels = [...labelsToAdd].filter(
              (label) => !currentLabelNames.has(label.toLowerCase())
            );

            if (missingLabels.length === 0) {
              core.info('No active issue labels need to be added to this PR.');
              return;
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: prNumber,
              labels: missingLabels,
            });
